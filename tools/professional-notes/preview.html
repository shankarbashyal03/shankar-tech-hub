<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Preview Note - Read-only view of your professional notes">
    <title>Preview Note | ShankarTech Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
        :root{--bg:#0f172a;--card:#1e293b;--card-alt:#334155;--text:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--accent:#3b82f6;--accent-hover:#2563eb;--accent2:#10b981;--warning:#f59e0b;--border:#334155;--input-bg:#0f172a;--shadow:0 8px 30px rgba(0,0,0,0.3);--transition:all 0.3s ease}
        body.light-mode{--bg:#f8fafc;--card:#ffffff;--card-alt:#f1f5f9;--text:#1e293b;--text-secondary:#475569;--text-muted:#94a3b8;--border:#e2e8f0;--input-bg:#f8fafc;--shadow:0 8px 30px rgba(0,0,0,0.06)}
        body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:background 0.3s,color 0.3s}
        .container{max-width:900px;margin:0 auto;width:100%;padding:20px;flex:1}

        .tool-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
        .back-btn{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:0.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;transition:var(--transition);white-space:nowrap}
        .back-btn:hover{transform:translateY(-2px);border-color:var(--accent)}
        h1{font-size:1.3rem;font-weight:800;color:var(--accent);flex:1;text-align:center;min-width:150px}
        .header-actions{display:flex;gap:6px;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:8px;font-weight:600;font-size:0.8rem;cursor:pointer;transition:var(--transition);border:none;white-space:nowrap;text-decoration:none}
        .btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent-hover)}
        .btn-warning{background:var(--warning);color:#000}.btn-warning:hover{opacity:0.9}
        .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--card-alt)}

        .note-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:30px;box-shadow:var(--shadow)}
        .note-title{font-size:1.6rem;font-weight:800;color:var(--text);margin-bottom:8px;padding-bottom:12px;border-bottom:2px solid var(--accent)}
        .note-meta{display:flex;gap:16px;font-size:0.8rem;color:var(--text-secondary);margin-bottom:20px;flex-wrap:wrap}
        .note-meta span{display:flex;align-items:center;gap:4px}
        .note-content{font-size:0.95rem;line-height:1.8;color:var(--text)}
        .note-content img{max-width:100%;border-radius:8px;margin:10px 0}
        .note-content audio{width:100%;margin:10px 0;border-radius:8px}
        .note-content table{width:100%;border-collapse:collapse;margin:12px 0}
        .note-content table td,.note-content table th{border:1px solid var(--border);padding:8px 12px}
        .note-content .file-attach{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:var(--card-alt);border:1px solid var(--border);border-radius:8px;margin:4px;cursor:pointer;font-size:0.85rem;color:var(--accent);text-decoration:none}
        .note-content ul,.note-content ol{padding-left:24px;margin:8px 0}
        .note-content input[type="checkbox"]{margin-right:6px;transform:scale(1.2);pointer-events:none}

        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
        .empty-state i{font-size:4rem;opacity:0.2;display:block;margin-bottom:16px}

        .export-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:2000}
        .export-modal-overlay.show{display:flex}
        .export-modal{background:var(--card);border-radius:14px;padding:24px;border:1px solid var(--border);max-width:350px;width:90%}
        .export-modal h3{margin-bottom:14px;color:var(--accent)}
        .export-modal .btn{width:100%;margin-bottom:8px;justify-content:center}

        .toast{position:fixed;top:20px;right:20px;background:var(--accent2);color:#fff;padding:12px 20px;border-radius:10px;font-weight:600;z-index:3000;animation:slideIn 0.3s ease;font-size:0.85rem;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

        @media(max-width:600px){.note-card{padding:20px}.note-title{font-size:1.3rem}h1{font-size:1rem}}
    </style>
</head>
<body>
    <div class="container">
        <div class="tool-header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <h1><i class="fas fa-eye"></i> Preview Note</h1>
            <div class="header-actions">
                <a href="#" id="editLink" class="btn btn-accent"><i class="fas fa-edit"></i> Edit</a>
                <button class="btn btn-warning" onclick="showExportModal()"><i class="fas fa-download"></i> Export</button>
            </div>
        </div>

        <div id="previewContent">
            <div class="empty-state">
                <i class="fas fa-sticky-note"></i>
                <p>No note selected</p>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="export-modal-overlay" id="exportModal">
        <div class="export-modal">
            <h3><i class="fas fa-download"></i> Export Note</h3>
            <button class="btn btn-accent" onclick="exportNote('pdf')"><i class="fas fa-file-pdf"></i> Save as PDF</button>
            <button class="btn btn-outline" onclick="exportNote('txt')"><i class="fas fa-file-alt"></i> Save as TXT</button>
            <button class="btn btn-outline" onclick="exportNote('doc')"><i class="fas fa-file-word"></i> Save as DOC</button>
            <button class="btn btn-outline" onclick="exportNote('html')"><i class="fas fa-file-code"></i> Save as HTML</button>
            <button class="btn btn-warning" onclick="exportNote('jpg')"><i class="fas fa-image"></i> Save as JPG</button>
            <button class="btn btn-outline" style="background:var(--card-alt);color:var(--text)" onclick="closeExportModal()">Cancel</button>
        </div>
    </div>

    <script>
        function applyTheme(t){document.body.classList.toggle('light-mode',t==='light')}
        applyTheme(localStorage.getItem('shankartech_theme')||'dark');
        window.addEventListener('storage',e=>{if(e.key==='shankartech_theme')applyTheme(e.newValue||'dark')});

        var NOTES_KEY='pro_notes_v2',notes=JSON.parse(localStorage.getItem(NOTES_KEY)||'[]');
        var currentNoteId=null;

        var params=new URLSearchParams(window.location.search);
        var id=params.get('id');
        if(id){
            var note=notes.find(function(n){return n.id===id});
            if(note){
                currentNoteId=id;
                document.getElementById('editLink').href='editor.html?id='+id;
                renderPreview(note);
            }
        }

        function renderPreview(note){
            var d=new Date(note.updatedAt);
            var dateStr=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
            var timeStr=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
            var statusBadge=note.status==='draft'?'<span style="background:rgba(245,158,11,0.2);color:#f59e0b;padding:2px 8px;border-radius:10px;font-size:0.7rem">📝 Draft</span>':'<span style="background:rgba(16,185,129,0.2);color:#10b981;padding:2px 8px;border-radius:10px;font-size:0.7rem">✅ Saved</span>';
            document.getElementById('previewContent').innerHTML='<div class="note-card">'+
                '<div class="note-title">'+escapeHtml(note.title)+'</div>'+
                '<div class="note-meta"><span>📅 '+dateStr+'</span><span>🕐 '+timeStr+'</span>'+statusBadge+'</div>'+
                '<div class="note-content">'+note.content+'</div></div>';
        }

        function escapeHtml(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}
        function stripHtml(h){var d=document.createElement('div');d.innerHTML=h;return d.textContent||d.innerText||'';}

        function showExportModal(){document.getElementById('exportModal').classList.add('show');}
        function closeExportModal(){document.getElementById('exportModal').classList.remove('show');}
        function exportNote(format){
            var note=notes.find(function(n){return n.id===currentNoteId});
            if(!note){showToast('No note loaded');return;}
            var title=note.title,content=note.content;
            closeExportModal();
            if(format==='txt'){var t=title+'\n\n'+stripHtml(content);var b=new Blob([t],{type:'text/plain'});saveAs(b,title+'.txt');}
            else if(format==='html'){var h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title></head><body><h1>'+title+'</h1>'+content+'</body></html>';var b=new Blob([h],{type:'text/html'});saveAs(b,title+'.html');}
            else if(format==='doc'){var h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title></head><body><h1>'+title+'</h1>'+content+'</body></html>';var b=new Blob([h],{type:'application/msword'});saveAs(b,title+'.doc');}
            else if(format==='pdf'){var{jsPDF}=window.jspdf;var doc=new jsPDF('p','mm','a4');doc.setFontSize(18);doc.text(title,20,20);
                var d=document.createElement('div');d.innerHTML=content;d.style.padding='20px';d.style.maxWidth='170mm';d.style.position='absolute';d.style.left='-9999px';document.body.appendChild(d);
                html2canvas(d,{scale:2}).then(function(c){document.body.removeChild(d);
                    var w=170,h=c.height*w/c.width;doc.addImage(c.toDataURL('image/jpeg',0.9),'JPEG',20,25,w,h);doc.save(title+'.pdf');
                });
            }
            else if(format==='jpg'){
                var d=document.createElement('div');d.innerHTML='<h1 style="color:#2563EB">'+title+'</h1>'+content;d.style.padding='20px';d.style.background='#fff';d.style.position='absolute';d.style.left='-9999px';document.body.appendChild(d);
                html2canvas(d,{scale:2,backgroundColor:'#fff'}).then(function(c){document.body.removeChild(d);c.toBlob(function(b){saveAs(b,title+'.jpg')},'image/jpeg',0.95);});
            }
            showToast('✅ Exported as '+format.toUpperCase());
        }

        function showToast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2500);}
        if('serviceWorker' in navigator){navigator.serviceWorker.register('../../../service-worker.js').catch(function(){})}
    </script>
</body>
</html>
